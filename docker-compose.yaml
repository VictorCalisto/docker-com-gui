version: '3'

services:
  python:
    build:
      context: .
      dockerfile: Dockerfile
    image: victorcalisto/lsiobase-gui:bionic
    container_name: python
    environment:
      - TZ=Brazil/East
    volumes:
      - ./python:/python
    ports:
      - "3389:3389"
      - "8080:8080"
    shm_size: "4gb"